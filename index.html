<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock Reels</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:black;
  font-family:system-ui,-apple-system;
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.reel{
  height:100vh;
  width:100%;
  position:relative;
  scroll-snap-align:start;
  overflow:hidden;
}
.player{
  width:100%;
  height:100%;
}
.overlay{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:25px;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
  color:white;
}
.category{
  display:inline-block;
  padding:5px 12px;
  background:#ff2e2e;
  border-radius:20px;
  font-size:12px;
  margin-bottom:10px;
}
.title{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}
.meta{
  font-size:13px;
  opacity:0.8;
}
.actions{
  position:absolute;
  right:15px;
  bottom:120px;
  display:flex;
  flex-direction:column;
  gap:25px;
  color:white;
  align-items:center;
}
.actions div{
  text-align:center;
  cursor:pointer;
  font-size:18px;
}
.heart{
  transition:transform 0.2s ease;
}
.heart.active{
  color:red;
  transform:scale(1.3);
}
.double-tap{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  opacity:0;
  pointer-events:none;
}
.double-tap.show{
  animation:pop 0.6s ease;
}
@keyframes pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1)}
}
</style>
</head>

<body>

<div id="reels"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let players = [];
let feedData = [];
let activeIndex = 0;

/* =========================
   LOAD + SMART ALGORITHM
========================= */

async function loadFeed() {
  const snapshot = await getDocs(collection(db,"news"));
  feedData = [];
  snapshot.forEach(doc => feedData.push(doc.data()));

  // Smart ranking
  feedData.forEach(n=>{
    const hoursOld = (Date.now() - new Date(n.publishedAt)) / 3600000;
    const recencyScore = Math.max(0, 48 - hoursOld);
    const randomness = Math.random() * 10;
    const categoryBoost = n.category === getPreferredCategory() ? 8 : 0;
    n.algorithmScore = recencyScore + randomness + categoryBoost;
  });

  feedData.sort((a,b)=> b.algorithmScore - a.algorithmScore);

  // Shuffle top 15 for dynamic refresh
  feedData = feedData.slice(0,15).sort(()=>Math.random()-0.5);

  render();
}

/* =========================
   RENDER
========================= */

function render(){
  const container=document.getElementById("reels");
  container.innerHTML="";
  players=[];

  feedData.forEach((n,i)=>{
    container.innerHTML+=`
      <div class="reel" data-index="${i}">
        <div class="player" id="player-${i}"></div>
        <div class="overlay">
          <div class="category">${n.category}</div>
          <div class="title">${n.title}</div>
          <div class="meta">${n.channel}</div>
        </div>
        <div class="actions">
          <div class="heart" onclick="toggleLike(this)">❤️<br><small>Like</small></div>
          <div>🔁<br><small>Share</small></div>
        </div>
        <div class="double-tap">❤️</div>
      </div>
    `;
  });

  initPlayers();
  observeReels();
}

/* =========================
   YOUTUBE PLAYER CONTROL
========================= */

function initPlayers(){
  feedData.forEach((n,i)=>{
    players[i] = new YT.Player(`player-${i}`,{
      videoId:n.videoId,
      playerVars:{
        autoplay:0,
        controls:0,
        modestbranding:1,
        rel:0
      }
    });
  });
}

function observeReels(){
  const reels=document.querySelectorAll(".reel");
  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const index=parseInt(entry.target.dataset.index);
      if(entry.isIntersecting){
        activeIndex=index;
        play(index);
        pauseOthers(index);
      }
    });
  },{threshold:0.75});
  reels.forEach(r=>observer.observe(r));
}

function play(i){
  if(players[i]?.playVideo)
    players[i].playVideo();
}

function pauseOthers(active){
  players.forEach((p,i)=>{
    if(i!==active && p?.pauseVideo)
      p.pauseVideo();
  });
}

/* =========================
   USER BEHAVIOR TRACKING
========================= */

window.toggleLike=function(el){
  el.classList.toggle("active");
  const category = feedData[activeIndex].category;
  localStorage.setItem("preferredCategory",category);
};

function getPreferredCategory(){
  return localStorage.getItem("preferredCategory") || "None";
}

document.addEventListener("dblclick",e=>{
  const reel=e.target.closest(".reel");
  if(!reel) return;
  const heart=reel.querySelector(".double-tap");
  heart.classList.add("show");
  setTimeout(()=>heart.classList.remove("show"),600);
});

/* =========================
   AUTO REFRESH EVERY 60s
========================= */

setInterval(()=>{
  loadFeed();
},60000);

/* ========================= */

loadFeed();

</script>

</body>
</html>

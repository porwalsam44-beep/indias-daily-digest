<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Shock News</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#fafafa;
}
.header{
  position:sticky;
  top:0;
  background:white;
  padding:15px;
  font-weight:700;
  text-align:center;
  border-bottom:1px solid #ddd;
  z-index:10;
}
.feed{
  max-width:500px;
  margin:auto;
}
.post{
  background:white;
  margin:15px 0;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.post-header{
  display:flex;
  align-items:center;
  padding:10px 15px;
  font-weight:600;
}
.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#ff2e2e;
  margin-right:10px;
}
.video{
  width:100%;
  height:350px;
}
.post-content{
  padding:15px;
}
.actions{
  display:flex;
  gap:15px;
  font-size:22px;
  margin-bottom:8px;
}
.like.active{
  color:#ff2e63;
}
.caption{
  font-size:14px;
  line-height:1.4;
}
.double-heart{
  position:absolute;
  font-size:80px;
  opacity:0;
  pointer-events:none;
}
.double-heart.show{
  animation:pop 0.6s ease;
}
@keyframes pop{
  0%{opacity:0;transform:scale(0.5)}
  50%{opacity:1;transform:scale(1.3)}
  100%{opacity:0;transform:scale(1)}
}
</style>
</head>

<body>

<div class="header">⚡ India Shock News</div>
<div class="feed" id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

// REAL TIME LISTENER
const q = query(collection(db,"news"), orderBy("publishedAt","desc"));

onSnapshot(q,(snapshot)=>{
  feed.innerHTML="";
  snapshot.forEach(doc=>{
    const n = doc.data();
    feed.innerHTML += `
      <div class="post">
        <div class="post-header">
          <div class="avatar"></div>
          ${n.channel}
        </div>

        <iframe class="video"
          src="https://www.youtube.com/embed/${n.videoId}"
          frameborder="0"
          allowfullscreen>
        </iframe>

        <div class="post-content">
          <div class="actions">
            <span class="like" onclick="toggleLike(this)">❤️</span>
            <span>💬</span>
            <span>🔁</span>
          </div>
          <div class="caption">
            <strong>${n.channel}</strong> ${n.title}
          </div>
        </div>
      </div>
    `;
  });
});

window.toggleLike=function(el){
  el.classList.toggle("active");
};

</script>

</body>
</html>

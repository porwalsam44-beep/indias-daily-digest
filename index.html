<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="title" content="Indias Daily Digest">
<meta name="description" content="Latest Indian news, trending updates and daily reports.">
<meta name="keywords" content="India news, daily digest, breaking news, headlines">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<title>Indias Daily Digest</title>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f0f0f;
  color:#e6e6e6;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#141414;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #222;
  z-index:1000;
}

.logo{
  font-weight:700;
  font-size:18px;
  color:#ff4500;
}

.search input{
  padding:8px 15px;
  border-radius:20px;
  border:none;
  background:#222;
  color:white;
  width:250px;
}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:250px 1fr 300px;
  gap:20px;
  padding:20px;
}

/* LEFT SIDEBAR */
.left{
  background:#141414;
  padding:15px;
  border-radius:10px;
  height:fit-content;
}

.left h3{
  font-size:14px;
  color:#aaa;
  margin-bottom:15px;
}

.left ul{
  list-style:none;
  padding:0;
}

.left li{
  padding:8px 0;
  cursor:pointer;
  transition:0.2s;
}

.left li:hover{
  color:#ff4500;
}

/* MAIN FEED */
.feed{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* POST CARD */
.post{
  background:#141414;
  border-radius:12px;
  padding:15px;
  border:1px solid #222;
}

.post-header{
  display:flex;
  align-items:center;
  font-weight:600;
  margin-bottom:10px;
}

.avatar{
  width:35px;
  height:35px;
  border-radius:50%;
  background:#ff4500;
  margin-right:10px;
}

.video{
  width:100%;
  height:350px;
  border-radius:10px;
  margin-bottom:10px;
}

.actions{
  display:flex;
  gap:20px;
  font-size:18px;
  margin-bottom:8px;
}

.actions span{
  cursor:pointer;
  transition:0.2s;
}

.actions span:hover{
  color:#ff4500;
}

.like.active{
  color:#ff4500;
}

.caption{
  font-size:14px;
  line-height:1.4;
}

/* RIGHT SIDEBAR */
.right{
  background:#141414;
  padding:15px;
  border-radius:10px;
  height:fit-content;
}

.widget{
  margin-bottom:20px;
}

.widget h4{
  font-size:14px;
  color:#aaa;
  margin-bottom:10px;
}

/* RESPONSIVE */
@media(max-width:1000px){
  .layout{
    grid-template-columns:1fr;
  }
  .left, .right{
    display:none;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">Indias Daily Digest</div>
  <div class="search">
    <input type="text" placeholder="Search news...">
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="left">
    <h3>Navigation</h3>
    <ul>
      <li>Home</li>
      <li>Trending</li>
      <li>Politics</li>
      <li>Sports</li>
      <li>Technology</li>
      <li>Entertainment</li>
    </ul>
  </div>

  <!-- MAIN FEED -->
  <div class="feed" id="feed"></div>

  <!-- RIGHT SIDEBAR -->
  <div class="right">
    <div class="widget">
      <h4>About</h4>
      <p>Indias Daily Digest delivers trending and breaking news in real-time.</p>
    </div>
    <div class="widget">
      <h4>Top Categories</h4>
      <p>Politics</p>
      <p>Sports</p>
      <p>Technology</p>
    </div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDUZh7BX5s_kcMLxKPjq73th6GS1VHl2Bw",
  authDomain: "india-shock-news-dd49b.firebaseapp.com",
  projectId: "india-shock-news-dd49b",
  storageBucket: "india-shock-news-dd49b.firebasestorage.app",
  messagingSenderId: "889325825355",
  appId: "1:889325825355:web:1a2778a1542cbc60490cce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const feed = document.getElementById("feed");

const q = query(collection(db,"news"), orderBy("publishedAt","desc"));

onSnapshot(q,(snapshot)=>{
  feed.innerHTML="";
  snapshot.forEach(doc=>{
    const n = doc.data();
    feed.innerHTML += `
      <div class="post">
        <div class="post-header">
          <div class="avatar"></div>
          ${n.channel}
        </div>

        <iframe class="video"
          src="https://www.youtube.com/embed/${n.videoId}"
          frameborder="0"
          allowfullscreen>
        </iframe>

        <div class="actions">
          <span class="like" onclick="toggleLike(this)">▲</span>
          <span>💬</span>
          <span>🔁</span>
        </div>

        <div class="caption">
          <strong>${n.channel}</strong> ${n.title}
        </div>
      </div>
    `;
  });
});

window.toggleLike=function(el){
  el.classList.toggle("active");
};

</script>

</body>
</html>
